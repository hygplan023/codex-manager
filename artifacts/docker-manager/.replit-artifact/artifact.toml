kind = "web"
previewPath = "/"
title = "Docker 容器管理平台"
version = "1.0.0"
id = "artifacts/docker-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18765

[services.development]
run = "pnpm --filter @workspace/docker-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docker-manager", "run", "build" ]
publicDir = "artifacts/docker-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18765"
BASE_PATH = "/"
